<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imposter Game</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111827;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: #1f2937;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #facc15;
    }

    h2 {
      margin-bottom: 15px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 16px;
    }

    input {
      background: #374151;
      color: white;
    }

    button {
      background: #facc15;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #fde047;
    }

    .hidden {
      display: none;
    }

    .card {
      background: #374151;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      margin-top: 15px;
    }

    .player-item {
      background: #4b5563;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .small-btn {
      background: #ef4444;
      color: white;
      padding: 6px 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      width: auto;
    }

    .small-btn:hover {
      background: #f87171;
    }

    .danger {
      background: #dc2626;
      color: white;
    }

    .hint-box {
      opacity: 0.85;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">

  <div id="setup-screen">
    <h1>🎭 Imposter Game</h1>

    <h2>Add Custom Word</h2>

    <input type="text" id="wordInput" placeholder="Enter secret word">
    <input type="text" id="hintInput" placeholder="Enter hint for imposter">

    <button onclick="addWord()">Add Word</button>
    <button class="danger" onclick="resetWords()">Reset All Words</button>

    <div id="wordList"></div>

    <h2>Game Settings</h2>
    <input type="number" id="playerCount" min="3" max="20" placeholder="Number of players">

    <button onclick="startGame()">Start Game</button>
  </div>

  <div id="reveal-screen" class="hidden">
    <h1>Player Reveal</h1>

    <div class="card">
      <h2 id="playerTurn"></h2>

      <button id="showRoleBtn" onclick="showRole()">Show My Role</button>

      <div id="roleDisplay" class="hidden">
        <div id="roleText"></div>
        <button onclick="nextPlayer()">Next Player</button>
      </div>
    </div>
  </div>

  <div id="clue-screen" class="hidden">
    <h1>🗣️ Clue Round</h1>
    <div class="card">
      <p>Players give clues about the word.</p>
      <button onclick="showVoting()">Continue To Voting</button>
    </div>
  </div>

  <div id="voting-screen" class="hidden">
    <h1>🗳️ Voting</h1>
    <div id="voteList"></div>
    <div id="result"></div>
    <button onclick="resetGame()">Play Again</button>
  </div>

</div>

<script>

let customWords = JSON.parse(localStorage.getItem('imposterWords') || '[]');
let players = [];
let currentPlayer = 0;
let imposterIndex = 0;
let selectedWord = null;

window.onload = () => renderWords();

function saveWords() {
  localStorage.setItem('imposterWords', JSON.stringify(customWords));
}

function addWord() {
  const word = document.getElementById('wordInput').value.trim();
  const hint = document.getElementById('hintInput').value.trim();

  if (!word || !hint) return alert('Enter word and hint');

  if (customWords.some(w => w.word.toLowerCase() === word.toLowerCase())) {
    return alert('Word already exists');
  }

  customWords.push({ word, hint });
  saveWords();

  document.getElementById('wordInput').value = '';
  document.getElementById('hintInput').value = '';

  renderWords();
}

function deleteWord(index) {
  customWords.splice(index, 1);
  saveWords();
  renderWords();
}

function resetWords() {
  if (!confirm('Delete ALL words?')) return;
  customWords = [];
  saveWords();
  renderWords();
}

// Words hidden except word label + delete button
function renderWords() {
  const list = document.getElementById('wordList');

  if (customWords.length === 0) {
    list.innerHTML = '<div class="hint-box">No words added yet</div>';
    return;
  }

  list.innerHTML = customWords.map((w, i) => `
    <div class="player-item">
      <span>Word: ${w.word}</span>
      <button class="small-btn" onclick="deleteWord(${i})">Delete</button>
    </div>
  `).join('');
}

function startGame() {
  const count = parseInt(document.getElementById('playerCount').value);

  if (!customWords.length) return alert('Add words first');
  if (!count || count < 3) return alert('Min 3 players');

  players = Array.from({ length: count }, (_, i) => `Player ${i + 1}`);

  imposterIndex = Math.floor(Math.random() * count);
  selectedWord = customWords[Math.floor(Math.random() * customWords.length)];

  currentPlayer = 0;

  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('reveal-screen').classList.remove('hidden');

  updateRevealScreen();
}

function updateRevealScreen() {
  document.getElementById('playerTurn').innerText = `${players[currentPlayer]}, pass device`;
  document.getElementById('showRoleBtn').classList.remove('hidden');
  document.getElementById('roleDisplay').classList.add('hidden');
}

function showRole() {
  const roleText = document.getElementById('roleText');

  if (currentPlayer === imposterIndex) {
    roleText.innerHTML = `😈 IMPOSTER<br><br>Hint: <b>${selectedWord.hint}</b>`;
  } else {
    roleText.innerHTML = `Word: <b>${selectedWord.word}</b>`;
  }

  document.getElementById('showRoleBtn').classList.add('hidden');
  document.getElementById('roleDisplay').classList.remove('hidden');
}

function nextPlayer() {
  currentPlayer++;

  if (currentPlayer >= players.length) {
    document.getElementById('reveal-screen').classList.add('hidden');
    document.getElementById('clue-screen').classList.remove('hidden');
    return;
  }

  updateRevealScreen();
}

function showVoting() {
  document.getElementById('clue-screen').classList.add('hidden');
  document.getElementById('voting-screen').classList.remove('hidden');

  const list = document.getElementById('voteList');
  list.innerHTML = '';

  players.forEach((p, i) => {
    list.innerHTML += `
      <div class="player-item">
        <span>${p}</span>
        <button class="small-btn" onclick="vote(${i})">Vote</button>
      </div>
    `;
  });
}

function vote(i) {
  const result = document.getElementById('result');

  if (i === imposterIndex) {
    result.innerHTML = `✔ Correct! ${players[i]} was imposter. Word: ${selectedWord.word}`;
  } else {
    result.innerHTML = `❌ Wrong! ${players[imposterIndex]} was imposter. Word: ${selectedWord.word}`;
  }
}

function resetGame() {
  location.reload();
}

</script>

</body>
</html>
